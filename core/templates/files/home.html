<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a1a1a'/%3E%3Ctext x='50' y='68' text-anchor='middle' fill='white' font-size='48' font-family='system-ui, sans-serif' font-weight='600'%3Ech%3C/text%3E%3C/svg%3E">
    <title>chichi · home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #111111;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* welcome badge - simple, no extra fluff */
        .welcome-badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666666;
            margin-bottom: 1.5rem;
            border-left: 2px solid #111111;
            padding-left: 0.75rem;
        }

        /* main greeting */
        .greeting {
            margin-bottom: 1rem;
        }

        .greeting-line {
            font-size: 2rem;
            font-weight: 400;
            color: #666666;
            margin-bottom: 0.25rem;
        }

        .username {
            font-size: 3.5rem;
            font-weight: 700;
            color: #111111;
            line-height: 1.2;
            margin-bottom: 0.5rem;
            word-break: break-word;
        }

        .question {
            font-size: 2rem;
            font-weight: 400;
            color: #111111;
            margin-bottom: 1.5rem;
        }

        /* description */
        .description {
            font-size: 1rem;
            color: #555555;
            line-height: 1.5;
            margin-bottom: 2rem;
            max-width: 480px;
        }

        /* connect button - clean black */
        .connect-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #111111;
            color: #ffffff;
            padding: 12px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.2s ease;
            border: 1px solid #111111;
        }

        .connect-btn i {
            font-size: 1.1rem;
        }

        .connect-btn:hover {
            background: #ffffff;
            color: #111111;
            border-color: #111111;
            transform: translateY(-1px);
        }

        /* responsive */
        @media (max-width: 550px) {
            .username {
                font-size: 2.5rem;
            }
            .greeting-line {
                font-size: 1.5rem;
            }
            .question {
                font-size: 1.5rem;
            }
            .connect-btn {
                padding: 10px 24px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- simple welcome indicator -->
        <div class="welcome-badge">welcome to chichi</div>
        
        <!-- clean greeting structure -->
        <div class="greeting">
            <div class="greeting-line">hey,</div>
            <div class="username">{{ request.user.username }}</div>
            <div class="question">what's good?</div>
        </div>
        
        <!-- description text -->
        <div class="description">
            Meet someone random. It might be worth it. Video & Chat.
        </div>
        
        <!-- connect button - opens in new window -->
        <a href="{% url 'connect' %}" class="connect-btn" target="_blank" rel="noopener noreferrer">
            <i class="bi bi-broadcast"></i>
            Start Matching
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
