{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- chichi brand favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a1a1a'/%3E%3Ctext x='50' y='68' text-anchor='middle' fill='white' font-size='48' font-family='system-ui, sans-serif' font-weight='600'%3Ech%3C/text%3E%3C/svg%3E">
    <title>chichi · sign in</title>
    <!-- Bootstrap 5 CSS + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 1.5rem;
        }

        /* minimal centered container — no card, just floating elements */
        .login-core {
            text-align: center;
            max-width: 380px;
            width: 100%;
        }

        /* chichi brand — clean, bold, simple */
        .brand {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #111;
            margin-bottom: 2.5rem;
            line-height: 1.1;
        }

        /* google button — clean, minimal, essential */
        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 100px;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 500;
            color: #1f2937;
            text-decoration: none;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 320px;
            margin-bottom: 2rem;
        }

        .google-btn i {
            font-size: 1.3rem;
        }

        .google-btn:hover {
            background: #fafafa;
            border-color: #ccc;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .google-btn:active {
            transform: translateY(1px);
        }

        /* the only text — instant access line */
        .instant-text {
            font-size: 0.8rem;
            color: #888;
            letter-spacing: 0.2px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .instant-text i {
            font-size: 0.75rem;
            color: #aaa;
        }

        /* responsive */
        @media (max-width: 480px) {
            .brand {
                font-size: 3rem;
                margin-bottom: 2rem;
            }
            .google-btn {
                padding: 12px 24px;
                font-size: 0.9rem;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>

<div class="login-core">
    <!-- only chichi brand -->
    <div class="brand">chichi</div>

    <!-- only google button -->
    <a href="{% provider_login_url 'google' next=request.GET.next|default:'home' %}" class="google-btn">
        <i class="bi bi-google"></i>
        <span>Sign in with Google</span>
    </a>

</div>

</body>
</html>
